<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003399">
  <meta name="description" content="GenZ'aide - Trouve des petits boulots près de chez toi !">
  <title>GenZ'aide - Petits boulots pour les jeunes</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="page">
    <div class="hero">
      <img src="img/logo.png" alt="GenZ'aide" class="hero-logo">

      <h1 class="hero-title">
        Trouve des <span>petits boulots</span> près de chez toi
      </h1>

      <p class="hero-subtitle">
        L'application qui met en relation jeunes motivés et particuliers pour des missions ponctuelles.
      </p>

      <div class="hero-buttons">
        <a href="chercheur.html" class="role-btn chercheur">
          <div class="role-icon">🔍</div>
          <div class="role-text">
            <h3>Je cherche un job</h3>
            <p>Découvre les missions autour de toi</p>
          </div>
        </a>

        <a href="fournisseur.html" class="role-btn fournisseur">
          <div class="role-icon">📋</div>
          <div class="role-text">
            <h3>Je propose un job</h3>
            <p>Publie une annonce en quelques clics</p>
          </div>
        </a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
